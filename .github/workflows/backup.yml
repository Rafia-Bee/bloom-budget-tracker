name: Database Backup

on:
  schedule:
    # Run daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:  # Allow manual trigger

jobs:
  backup:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing backups to repository

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install PostgreSQL 17 client
        run: |
          # Add PostgreSQL apt repository
          sudo sh -c 'echo "deb http://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          sudo apt-get update
          # Remove default PostgreSQL and install version 17
          sudo apt-get remove -y postgresql-client-common postgresql-client postgresql-16 postgresql-client-16 || true
          sudo apt-get install -y postgresql-client-17
          # Ensure pg_dump points to version 17
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          which pg_dump
          pg_dump --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Create backups directory
        run: mkdir -p backups

      - name: Run backup script
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GITHUB_BACKUP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATH: /usr/lib/postgresql/17/bin:${{ env.PATH }}
        run: |
          python scripts/backup_database.py

      - name: Upload backup artifacts
        uses: actions/upload-artifact@v4
        with:
          name: database-backup-${{ github.run_number }}
          path: scripts/backups/*.gz
          retention-days: 30
