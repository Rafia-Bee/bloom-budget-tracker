name: CI/CD Pipeline

# Run on push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    name: Backend - Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-flask

      - name: Run flake8 linting
        run: |
          echo "🔍 Running flake8..."
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          echo "🎨 Checking code formatting..."
          black --check backend/

      - name: Run backend tests
        run: |
          echo "🧪 Running backend tests..."
          cd backend
          python -m pytest tests/ -v --tb=short --color=yes
        env:
          SENDGRID_API_KEY: ""
          DATABASE_URL: ""

  frontend-checks:
    name: Frontend - Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests
        working-directory: ./frontend
        run: |
          echo "🧪 Running frontend tests..."
          npm test -- --run

      - name: Check for console.log statements
        run: |
          echo "🔍 Checking for console.log statements..."
          if grep -r "console\.log" frontend/src --exclude-dir=node_modules; then
            echo "❌ Found console.log statements in source code"
            echo "Please remove debug console.log statements before committing"
            exit 1
          else
            echo "✅ No console.log statements found"
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          echo "🏗️  Building frontend..."
          npm run build

      - name: Check build output
        working-directory: ./frontend
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful - dist directory created"
            ls -lh dist/
          else
            echo "❌ Build failed - no dist directory"
            exit 1
          fi

  coverage:
    name: Coverage - Test Coverage Analysis
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-flask pytest-cov

      - name: Install Node dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Backend coverage
        run: |
          echo "📊 Running backend coverage analysis..."
          cd backend
          python -m pytest tests/ -v --tb=short --cov=. --cov-report=term-missing --cov-fail-under=20
        env:
          SENDGRID_API_KEY: ""
          DATABASE_URL: ""

      - name: Frontend coverage
        working-directory: ./frontend
        run: |
          echo "📊 Running frontend coverage analysis..."
          npm test -- --run --coverage

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, coverage]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "📊 CI Pipeline Summary"
          echo "Backend checks: ${{ needs.backend-checks.result }}"
          echo "Frontend checks: ${{ needs.frontend-checks.result }}"
          echo "Coverage: ${{ needs.coverage.result }}"

          if [ "${{ needs.backend-checks.result }}" == "failure" ] || [ "${{ needs.frontend-checks.result }}" == "failure" ] || [ "${{ needs.coverage.result }}" == "failure" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          else
            echo "✅ All checks passed!"
          fi
