name: CI/CD Pipeline

# Run on push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    name: Backend - Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-flask pytest-cov

      - name: Run flake8 linting
        run: |
          echo "🔍 Running flake8..."
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          echo "🎨 Checking code formatting..."
          black --check backend/

      - name: Run backend tests with coverage
        run: |
          echo "🧪 Running backend tests with coverage..."
          cd backend
          python -m pytest tests/ -v --tb=short --color=yes --cov=. --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=20
        env:
          SENDGRID_API_KEY: ""
          DATABASE_URL: ""

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.json
          retention-days: 1

  frontend-checks:
    name: Frontend - Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: |
          echo "🧪 Running frontend tests with coverage..."
          npm test -- --run --coverage --coverage.reporter=json-summary

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json
          retention-days: 1

      - name: Check for console.log statements
        run: |
          echo "🔍 Checking for console.log statements..."
          if grep -r "console\.log" frontend/src --exclude-dir=node_modules; then
            echo "❌ Found console.log statements in source code"
            echo "Please remove debug console.log statements before committing"
            exit 1
          else
            echo "✅ No console.log statements found"
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          echo "🏗️  Building frontend..."
          npm run build

      - name: Check build output
        working-directory: ./frontend
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful - dist directory created"
            ls -lh dist/
          else
            echo "❌ Build failed - no dist directory"
            exit 1
          fi

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: ./backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend-coverage

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Summary"
          echo "===================="
          echo ""
          echo "🐍 Backend Coverage:"
          if [ -f "./backend-coverage/coverage.json" ]; then
            BACKEND_PCT=$(cat ./backend-coverage/coverage.json | python3 -c "import sys, json; data=json.load(sys.stdin); print(f\"{data['totals']['percent_covered']:.1f}%\")")
            echo "   Total: $BACKEND_PCT"
          else
            echo "   Coverage data not found"
          fi
          echo ""
          echo "⚛️  Frontend Coverage:"
          if [ -f "./frontend-coverage/coverage-summary.json" ]; then
            LINES=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('lines',{}).get('pct','N/A'))")
            STMTS=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('statements',{}).get('pct','N/A'))")
            FUNCS=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('functions',{}).get('pct','N/A'))")
            BRANCHES=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('branches',{}).get('pct','N/A'))")
            echo "   Lines: ${LINES}%"
            echo "   Statements: ${STMTS}%"
            echo "   Functions: ${FUNCS}%"
            echo "   Branches: ${BRANCHES}%"
          else
            echo "   Coverage data not found"
          fi
          echo ""
          echo "===================="

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, coverage-report]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "📊 CI Pipeline Summary"
          echo "Backend checks: ${{ needs.backend-checks.result }}"
          echo "Frontend checks: ${{ needs.frontend-checks.result }}"
          echo "Coverage report: ${{ needs.coverage-report.result }}"

          if [ "${{ needs.backend-checks.result }}" == "failure" ] || [ "${{ needs.frontend-checks.result }}" == "failure" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          else
            echo "✅ All checks passed!"
          fi
