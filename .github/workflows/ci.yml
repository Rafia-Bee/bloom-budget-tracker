name: CI/CD Pipeline

# Run on push to main and on pull requests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-checks:
    name: Backend - Lint, Format & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 black pytest pytest-flask pytest-cov

      - name: Run flake8 linting
        run: |
          echo "🔍 Running flake8..."
          flake8 backend/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 backend/ --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Check code formatting with black
        run: |
          echo "🎨 Checking code formatting..."
          black --check backend/

      - name: Run backend tests with coverage
        run: |
          echo "🧪 Running backend tests with coverage..."
          cd backend
          python -m pytest tests/ -v --tb=short --color=yes --cov=. --cov-report=term-missing --cov-report=json:coverage.json --cov-fail-under=50
        env:
          SENDGRID_API_KEY: ""
          DATABASE_URL: ""

      - name: Upload backend coverage
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.json
          retention-days: 1

  frontend-checks:
    name: Frontend - Build, Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run frontend tests with coverage
        working-directory: ./frontend
        run: |
          echo "🧪 Running frontend tests with coverage..."
          npm test -- --run --coverage --coverage.reporter=json-summary

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json
          retention-days: 1

      - name: Check for console.log statements
        run: |
          echo "🔍 Checking for console.log statements..."
          if grep -r "console\.log" frontend/src --exclude-dir=node_modules; then
            echo "❌ Found console.log statements in source code"
            echo "Please remove debug console.log statements before committing"
            exit 1
          else
            echo "✅ No console.log statements found"
          fi

      - name: Build frontend
        working-directory: ./frontend
        run: |
          echo "🏗️  Building frontend..."
          npm run build

      - name: Check build output
        working-directory: ./frontend
        run: |
          if [ -d "dist" ]; then
            echo "✅ Build successful - dist directory created"
            ls -lh dist/
          else
            echo "❌ Build failed - no dist directory"
            exit 1
          fi

  e2e-tests:
    name: E2E Tests - Playwright
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]
    # Skip E2E for docs-only or config-only changes
    if: |
      !contains(github.event.head_commit.message, '[skip e2e]') &&
      !contains(github.event.head_commit.message, '[docs only]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: ./frontend
        run: npx playwright install chromium --with-deps

      - name: Install Playwright deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        working-directory: ./frontend
        run: npx playwright install-deps chromium

      - name: Initialize test database
        run: |
          echo "🗄️ Creating test database and test user..."
          python -c "
          import sys
          sys.path.insert(0, '.')
          from backend.app import create_app
          from backend.models.database import db, User

          app = create_app('development')
          with app.app_context():
              db.create_all()
              print('✅ Database tables created')

              # Create test user for E2E tests
              test_user = User.query.filter_by(email='test@test.com').first()
              if not test_user:
                  test_user = User(email='test@test.com')
                  test_user.set_password('test123')
                  db.session.add(test_user)
                  db.session.commit()
                  print('✅ Test user created: test@test.com')
              else:
                  print('✅ Test user already exists')
          "
        env:
          FLASK_ENV: development
          DATABASE_URL: ""

      - name: Run E2E tests
        working-directory: ./frontend
        run: |
          echo "🎭 Running E2E tests with Playwright..."
          npx playwright test --project=chromium
        env:
          CI: true
          FLASK_ENV: development
          DATABASE_URL: ""
          SENDGRID_API_KEY: ""

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-report
          path: |
            frontend/playwright-report/
            frontend/e2e-results/
          retention-days: 7

      - name: Upload E2E screenshots on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: frontend/e2e-results/**/*.png
          retention-days: 7

  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks]

    steps:
      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: backend-coverage
          path: ./backend-coverage

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-coverage
          path: ./frontend-coverage

      - name: Display coverage summary
        run: |
          echo "📊 Coverage Summary"
          echo "===================="
          echo ""
          echo "🐍 Backend Coverage:"
          if [ -f "./backend-coverage/coverage.json" ]; then
            BACKEND_PCT=$(cat ./backend-coverage/coverage.json | python3 -c "import sys, json; data=json.load(sys.stdin); print(f\"{data['totals']['percent_covered']:.1f}%\")")
            echo "   Total: $BACKEND_PCT"
          else
            echo "   Coverage data not found"
          fi
          echo ""
          echo "⚛️  Frontend Coverage:"
          if [ -f "./frontend-coverage/coverage-summary.json" ]; then
            LINES=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('lines',{}).get('pct','N/A'))")
            STMTS=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('statements',{}).get('pct','N/A'))")
            FUNCS=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('functions',{}).get('pct','N/A'))")
            BRANCHES=$(cat ./frontend-coverage/coverage-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('total',{}).get('branches',{}).get('pct','N/A'))")
            echo "   Lines: ${LINES}%"
            echo "   Statements: ${STMTS}%"
            echo "   Functions: ${FUNCS}%"
            echo "   Branches: ${BRANCHES}%"
          else
            echo "   Coverage data not found"
          fi
          echo ""
          echo "===================="

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [backend-checks, frontend-checks, e2e-tests, coverage-report]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "📊 CI Pipeline Summary"
          echo "Backend checks: ${{ needs.backend-checks.result }}"
          echo "Frontend checks: ${{ needs.frontend-checks.result }}"
          echo "E2E tests: ${{ needs.e2e-tests.result }}"
          echo "Coverage report: ${{ needs.coverage-report.result }}"

          # E2E can be skipped (for docs-only changes) - that's OK
          if [ "${{ needs.backend-checks.result }}" == "failure" ] || [ "${{ needs.frontend-checks.result }}" == "failure" ]; then
            echo "❌ CI pipeline failed"
            exit 1
          elif [ "${{ needs.e2e-tests.result }}" == "failure" ]; then
            echo "❌ E2E tests failed"
            exit 1
          elif [ "${{ needs.e2e-tests.result }}" == "skipped" ]; then
            echo "⏭️  E2E tests skipped (docs/config only)"
            echo "✅ All required checks passed!"
          else
            echo "✅ All checks passed!"
          fi
