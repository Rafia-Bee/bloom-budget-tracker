name: Generate Recurring Expenses

# Run daily at 2 AM UTC (3 AM CET, 4 AM CEST)
on:
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  generate-expenses:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Recurring Expense Generation
        run: |
          echo "🚀 Triggering recurring expense generation..."

          # Login first to get JWT token
          LOGIN_RESPONSE=$(curl -s -X POST \
            https://bloom-backend-b44r.onrender.com/auth/login \
            -H "Content-Type: application/json" \
            -d '{"email": "${{ secrets.BLOOM_ADMIN_EMAIL }}", "password": "${{ secrets.BLOOM_ADMIN_PASSWORD }}"}')

          TOKEN=$(echo $LOGIN_RESPONSE | jq -r '.access_token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "❌ Failed to authenticate"
            echo "Response: $LOGIN_RESPONSE"
            exit 1
          fi

          echo "✅ Authenticated successfully"

          # Generate recurring expenses for all users
          RESPONSE=$(curl -s -X POST \
            "https://bloom-backend-b44r.onrender.com/recurring-generation/generate/all?days_ahead=60" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json")

          echo "📊 Generation Response:"
          echo $RESPONSE | jq '.'

          # Check if generation was successful
          SUCCESS=$(echo $RESPONSE | jq -r '.success')

          if [ "$SUCCESS" = "true" ]; then
            GENERATED=$(echo $RESPONSE | jq -r '.data.generated_count')
            echo "✅ Successfully generated $GENERATED recurring expenses"
          else
            echo "❌ Generation failed"
            echo $RESPONSE
            exit 1
          fi
