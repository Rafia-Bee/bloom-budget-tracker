<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clear Service Worker - Bloom</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #FFE5EC 0%, #FFC2D1 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #FF69B4;
            margin-top: 0;
        }
        button {
            background: #FF69B4;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            margin-right: 10px;
        }
        button:hover {
            background: #FF1493;
        }
        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        .info {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border-left: 4px solid #2196F3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌸 Clear Service Worker Cache</h1>

        <div class="info">
            <strong>When to use this:</strong>
            <ul>
                <li>Getting CSP (Content Security Policy) errors</li>
                <li>Old cached data causing issues</li>
                <li>After domain changes</li>
            </ul>
        </div>

        <button onclick="clearCache()">Clear Service Worker & Cache</button>
        <button onclick="goHome()">Go to App</button>

        <div id="status" class="status"></div>
    </div>

    <script>
        async function clearCache() {
            const statusDiv = document.getElementById('status');
            statusDiv.style.display = 'block';

            try {
                // Unregister all service workers
                if ('serviceWorker' in navigator) {
                    const registrations = await navigator.serviceWorker.getRegistrations();
                    for (let registration of registrations) {
                        await registration.unregister();
                    }
                }

                // Clear all caches
                if ('caches' in window) {
                    const cacheNames = await caches.keys();
                    await Promise.all(cacheNames.map(name => caches.delete(name)));
                }

                // Clear localStorage and sessionStorage
                localStorage.clear();
                sessionStorage.clear();

                statusDiv.className = 'status success';
                statusDiv.innerHTML = `
                    <strong>✅ Success!</strong><br>
                    Service worker unregistered<br>
                    All caches cleared<br>
                    Local storage cleared<br>
                    <br>
                    <strong>Next steps:</strong><br>
                    1. Close this tab<br>
                    2. Clear browser history/cache<br>
                    3. Visit the app again
                `;
            } catch (error) {
                statusDiv.className = 'status error';
                statusDiv.innerHTML = `
                    <strong>❌ Error:</strong><br>
                    ${error.message}<br>
                    <br>
                    Try clearing browser cache manually.
                `;
            }
        }

        function goHome() {
            window.location.href = '/';
        }
    </script>
</body>
</html>
