# Netlify Configuration for Bloom Budget Tracker

[build]
  base = "frontend"
  command = "npm run build"
  publish = "dist"

# Redirect all requests to index.html for SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Custom domain configuration
[[redirects]]
  from = "https://the-bloom-tracker.netlify.app/*"
  to = "https://bloom-tracker.app/:splat"
  status = 301
  force = true

# Security headers (same as _headers but in TOML format)
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
    Content-Security-Policy = "default-src 'self'; connect-src 'self' https://bloom-backend-b44r.onrender.com http://localhost:5000; img-src 'self' data: blob:; media-src 'self' blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; font-src 'self' data:; frame-ancestors 'none'; form-action 'self'; base-uri 'self';"
