[pytest]
testpaths = backend/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = backend
omit =
    backend/tests/*
    backend/__pycache__/*
    backend/migrations/*
    backend/archive/*

[coverage:report]
fail_under = 50
show_missing = true
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
