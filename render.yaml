services:
  - type: web
    name: bloom-backend
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT backend.app:app
    disk:
      name: bloom-data
      mountPath: /opt/render/project/data
      sizeGB: 1
    envVars:
      - key: FLASK_ENV
        value: production
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_PATH
        value: /opt/render/project/data/bloom.db
